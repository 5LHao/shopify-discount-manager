<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <form method="POST" class="bg-white p-8 rounded shadow w-96">

    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>

    {% if error %}
      <p class="bg-red-100 text-red-800 p-2 rounded mb-4 text-center">{{ error }}</p>
    {% endif %}

    <label class="block mb-2">Username</label>
    <input name="username" class="w-full border p-2 rounded mb-4" required>

    <label class="block mb-2">Password</label>
    <input name="password" type="password" class="w-full border p-2 rounded mb-6" required>

    <button class="w-full bg-blue-600 text-white py-2 rounded">Login</button>
  </form>

</body>
</html>
